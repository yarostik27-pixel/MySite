<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentCars UA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="logo">RentCars</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#home">Головна</a></li>
                <li><a href="#cars">Авто</a></li>
                <li><a href="#about">Про нас</a></li>
                <li><a href="#reviews">Відгуки</a></li>
            </ul>
        </nav>
        <button class="header-btn">Увійти</button>
    </header>

    <!-- HERO з кнопками CTA -->
    <section class="hero" id="home">
        <div class="hero-text">
            <h1>Знайди, забронюй та орендуй авто легко</h1>
            <p>Найкращий сервіс оренди автомобілів в Україні. Швидко, зручно та безпечно.</p>
            <div class="hero-buttons">
                <button>Google Play</button>
                <button>App Store</button>
            </div>
        </div>
        <div class="hero-image">
            <img src="photo.png" alt="BMW">
        </div>
    </section>

    <!-- SEARCH BOX -->
    <section class="search-box">
        <div class="search-item">
            <label>Місто</label>
            <select>
                <option>Київ</option>
                <option>Львів</option>
                <option>Одеса</option>
            </select>
        </div>
        <div class="search-item">
            <label>Дата</label>
            <input type="date">
        </div>
        <div class="search-item">
            <label>Тип авто</label>
            <select>
                <option>Усі</option>
                <option>Спорткар</option>
                <option>Седан</option>
                <option>SUV</option>
            </select>
        </div>
        <button class="search-btn">Пошук</button>
    </section>

</body>
</html>
